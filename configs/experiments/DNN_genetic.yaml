# configs/experiments/DNN_genetic_baseline.yaml
#
# Reference experiment config for the DecisionTreeRegressor.
# Inherits shared defaults from configs/_base.yaml; keys here override base.
#
# Run:
#   python main.py --config configs/experiments/DNN_genetic.yaml --mode train
#   python main.py --config configs/experiments/DNN_genetic.yaml --mode eval
#
# Commit convention (STANDARDS §1):
#   exp: decision tree baseline — depth 5, survival_months target

experiment_name: dnn_genetic_paper_architicture

# ── Modalities ──────────────────────────────────────────────────────────────
modalities:
  tabular: true
  image:   false

# ── Model ───────────────────────────────────────────────────────────────────
model:
  category: tabular_only
  type:     tabular_mlp

  droprate: 0.4
  
  random_state: 42
  target_scale: false

# ── Dataset ─────────────────────────────────────────────────────────────────
dataset:
  data_root:       data/processed
  tabular_file:    coad_rna_selected:21.parquet
  target_col:      TMB   # regression target column
  log1p_target: false                    # Apply log1p to targets before computing loss
  run_preprocessor_pipeline: true

  use_preextracted: true
  patch_size: 512                       # Original tile size (if tiling)
  max_patches: 16                       # Max tiles per slide (zero-padded if fewer)
  image_size: 224                       # Resize to InceptionV3's native resolution

  patients_split_file: "data/master_patient_splits.csv"
  seed:         42      # controls the deterministic train/val split
  batch_size:   32

# ── Training ────────────────────────────────────────────────────────────────
training:
  save_dir: freezed-models/runs/checkpoints

  epochs: 60
  val_every: 1
  lr: 0.001
  weight_decay: 0.0001


  risk_threshold:  10
  upload_pickled_model: true

# ── Weights & Biases ────────────────────────────────────────────────────────
wandb:
  run_name: "dnn_genetic_paper-epch:60-batch:32-lr:1e-3-droprate:0.4"
  tags:
    - genetic_only
    - COAD
    - neural_network
    - paper_architecture
