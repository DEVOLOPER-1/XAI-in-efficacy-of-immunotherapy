# configs/experiments/random_forest_baseline.yaml
#
# Reference experiment config for the DecisionTreeRegressor.
# Inherits shared defaults from configs/_base.yaml; keys here override base.
#
# Run:
#   python main.py --config configs/experiments/random_forest.yaml --mode train
#   python main.py --config configs/experiments/random_forest.yaml --mode eval
#
# Commit convention (STANDARDS §1):
#   exp: decision tree baseline — depth 5, survival_months target

experiment_name: rf_baseline_depth_5

# ── Modalities ──────────────────────────────────────────────────────────────
modalities:
  tabular: true
  image:   false

# ── Model ───────────────────────────────────────────────────────────────────
model:
  category: tabular_only
  type:     random_forest

  # Regularisation — tune these to control overfitting.
  # Start shallow (max_depth 3–5) and increase only if underfitting.
  n_estimators:        500
  max_depth:          null       # null = fully grown tree (will overfit)
  min_samples_split:  40      # a node must have >= 10 samples to be split
  min_samples_leaf:   30       # each leaf must contain >= 5 samples

  # Loss function for the split quality criterion.
  # squared_error: standard MSE — best default for survival regression.
  # absolute_error: more robust to outlier survival values.
  # friedman_mse:  weighted MSE with Friedman's improvement score.
  criterion:    absolute_error

  select_top_k: 256

  random_state: 42

# ── Dataset ─────────────────────────────────────────────────────────────────
dataset:
  data_root:       data/processed
  tabular_file:    coad_rna.parquet   # local artifact: generate with data/processing scripts
  target_col:      TMB   # regression target column

  val_ratio:    0.15    # 15% of patients held out for validation
  seed:         42      # controls the deterministic train/val split
#  batch_size:   512     not used for decision tree, but kept here for config completeness

  # image fields are unused when modalities.image: false, but kept here
  # so the config is complete if you later switch to a fusion model.
  use_preextracted: true
  features_dir:     features

# ── Training ────────────────────────────────────────────────────────────────
training:
  save_dir: freezed-models/runs/checkpoints

  # risk_threshold: binarise TMB at this value to compute AUROC/AUPRC.
  # Patients with TMB >= threshold → high-risk class (label 1).
  # Set to null to skip binary metrics.
  risk_threshold:  10

# ── Weights & Biases ────────────────────────────────────────────────────────
wandb:
  run_name: "random_forest_depth:inf_n:500_min_split:40_min_leaf:30_criterion:absolute_error"
  tags:
    - genetic_only
    - COAD
    - random_forest
    - feature_selection