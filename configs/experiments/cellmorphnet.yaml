experiment_name: cellmorphnet_tmb_prediction

# ── Modality Configuration ─────────────────────────────────────────────────
modalities:
  image: true
  tabular: false

# ── Dataset Configuration ──────────────────────────────────────────────────
dataset:
  target_col: "TMB_NONSYNONYMOUS"
  # TMB is extremely heavy-tailed (median 3.17, max 433) → log1p stabilises gradients.
  # Without this the loss is dominated by outliers and R² stays negative.
  log1p_target: true        # Apply log1p(TMB) before computing loss
  # Memory budget: batch_size=16 × max_patches=16 = 256 tiles per step
  max_patches: 16           # Use all available tiles (most patients have exactly 16)
  image_size: 224           # Standard 224×224 patch size (20× magnification)
  batch_size: 12            # Reduced to fit 16 tiles × 16 slides in VRAM
  val_ratio: 0.15
  seed: 42

# ── Model Configuration ────────────────────────────────────────────────────
model:
  category: "image_only"
  type: "cellmorphnet"

  task_mode: "regression"  # "classification" for binary TMB-H/L
  dropout: 0.1             # Paper uses light dropout; reduced from 0.2 for stability
  window_size: 7           # HCRA local window (divides 56, 28, 14 exactly)

  # Backbone dims match paper exactly (Table I in Xu et al. 2024)
  # embed_dims: [64, 128, 256, 512]
  # depths:     [2, 2, 6, 2]
  # num_heads:  [2, 4, 8, 16]

  # Optimizer settings from paper (Lion optimizer approximated with AdamW)
  learning_rate: 0.0001
  epochs: 100
  # Target standardisation stats (log1p scale, computed from COAD train set)
  # log1p(TMB): mean≈1.79, std≈1.09 — standardise so predictions start near 0
  target_scale: true
  target_mean: 1.79
  target_std: 1.09

# ── Training Hyperparameters ───────────────────────────────────────────────
training:
  epochs: 100
  val_every: 5
  lr: 0.0001
  weight_decay: 1e-4
  grad_clip: 1.0
  save_dir: "logs/runs/checkpoints"
  # CosineAnnealingLR: decays lr from 1e-4 → 1e-6 over 100 epochs
  # This prevents the flat plateau seen when lr stays fixed throughout
  scheduler: "CosineAnnealing"
  scheduler_T_max: 100      # Full cosine cycle = total epochs
  scheduler_eta_min: 1.0e-6 # Minimum LR floor

# ── W&B Configuration ──────────────────────────────────────────────────────
wandb:
  run_name: "cellmorphnet_window_attn_100ep_annealing_log1p_target"
  tags:
    - cellmorphnet
    - window_attention
    - hcra
    - deconvolution
    - tmb_prediction
    - xu2024