# configs/experiments/shimada_inception_swi.yaml
# Shimada et al. (2021) InceptionV3-based TMB prediction experiment

experiment_name: shimada2021_inception_swi

# ── Modality configuration ─────────────────────────────────────────────────
modalities:
  tabular: false
  image:   true
  modality: image  # for the dashboard categories
# ── Dataset configuration ──────────────────────────────────────────────────
dataset:
  # Paths (relative to data_root)
  data_root: "data"
  tabular_file: "clinical.csv"          # Only used if modalities.tabular=true
  images_dir: "images"
  features_dir: "features"
  
  # Target & identifiers
  target_col: "TMB_NONSYNONYMOUS"       # Continuous TMB value
  patient_id_col: "PATIENT_ID"
  
  # Image/patch settings
  use_preextracted: false                # true loads 1D numpy feature vectors from features/<PATIENT_ID>.npy vs false loads tile PNGs from images/<PATIENT_ID>/
  patch_size: 512                       # Original tile size (if tiling)
  max_patches: 16                       # Max tiles per slide (zero-padded if fewer)
  image_size: 299                       # Resize to InceptionV3's native resolution
  
  # Splitting
  patients_split_file: "data/master_patient_splits.csv"
  val_ratio: 0.15
  seed: 42
  
  # Batching
  batch_size: 32
  
  # Target transformation (for regression stability)
  # TMB is heavily right-skewed (mean≈14, max≈433) — log1p brings it to ~[0,6]
  log1p_target: true                    # Apply log1p to targets before computing loss
  # Note: target_mean/std below are estimated on the log1p-transformed training TMB

# ── Model configuration ────────────────────────────────────────────────────
model:
  category: "image_only"                # Options: tabular_only | image_only | fusion
  type: "inception_shimada"             # Registered in src/models/__init__.py
  
  # Task settings
  task_mode: "regression"               # "regression" for continuous TMB, "classification" for TMB-H binary
  dropout: 0.5                          # Dropout rate in task head
  
  # Backbone settings
  freeze_backbone: true                 # Start frozen; unfreeze later for fine-tuning
  tile_chunk_size: 16                   # Process at most this many tiles per CNN forward pass

  # Target scaling (CRITICAL for stable regression training)
  # ⚠️ Values below estimated from training-set log1p(TMB_NONSYNONYMOUS):
  #    log1p(14.23) ≈ 2.71 for mean; std on log-scale ≈ 1.3
  target_scale: true
  target_mean: 2.71                     # Mean of log1p(TMB) in training set
  target_std: 1.30                      # Std  of log1p(TMB) in training set

  # Fallback hyperparameters (training section takes precedence)
  learning_rate: 1e-4
  epochs: 50

# ── Training hyperparameters ───────────────────────────────────────────────
training:
  epochs: 50
  val_every: 5                          # Validate and log every N epochs
  
  # Optimisation
  lr: 1e-4                              # Lower LR for pretrained backbone fine-tuning
  weight_decay: 1e-4                    # L2 regularisation
  grad_clip: 1.0                        # Max gradient norm (prevents explosion)
  
  # Checkpointing
  save_dir: "logs/runs/checkpoints"
  upload_pickled_model: false           # Set true to upload weights to W&B
  
  # Risk stratification (optional, for classification mode)
  risk_threshold: 27.0                  # TMB cutoff for TMB-H classification

# ── Weights & Biases configuration ─────────────────────────────────────────
wandb:
  entity: "mohamed-mourad-zewail-city"
  project_name: "TMB-prediction"
  run_name: "inception_shimada_50epochs_finetuning"
  tags:
    - images_only
    - inception_cnn
    - shimada2021
    - feature_extractor