project_name: "WhiteBox - Explainable TMB Prediction"
modalities:
    image: false
    tabular: true
#    genetic: false ^^ not implemented yet; reserved for future work
dataset:
#data_root          str   "data"
#    tabular_file       str   "clinical.csv" (rooted at data_root)
#    images_dir         str   "images"
#    features_dir       str   "features"
#    target_col         str   "survival_months"
#    patient_id_col     str   "PATIENT_ID"
#    use_preextracted   bool  true     ← load .npy features; false = tile SVS on-the-fly
#    patch_size         int   256      ← tile size when tiling SVS on-the-fly
#    max_patches        int   16       ← patches sampled per slide per epoch
#    val_ratio          float 0.15
#    seed               int   42
#    batch_size         int   32
#    image_size         int   224      ← resize each patch/tile to this resolution
    data_root: "data/processed"
    tabular_file: "stad_clinical_patient_full.parquet"
    images_dir: "images"
    features_dir: "features"
    target_col: "TMB"
    patient_id_col: "PATIENT_ID"
    use_preextracted: true
    patch_size: 256
    max_patches: 16
    val_ratio: 0.15
    seed: 42
    batch_size: 32
    image_size: 224
model:
    category: "tabular_only"        # "tabular_only", "image_only", or "fusion"
    fusion_strategy: "early"        # "early" or "late"
    type: "CNN"
    optimizer: "Adam"
    learning_rate: 0.001
    batch_size: 32
    epochs: 50
    architecture: "CNN_v1"
wandb:
    entity: "mohamed-mourad-zewail-city"
    project_name: "TMB-prediction"
