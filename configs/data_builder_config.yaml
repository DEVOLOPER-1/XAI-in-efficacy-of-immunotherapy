# configs/data_builders/data_builder_config.yaml
project_name: "WhiteBox - Explainable TMB Prediction"
paths:
  root_data_dir: "data"
  features_dir: "data/features"
  temp_svs_dir: "data/images"
  manifest_path: "data/gdc_manifest.txt"
  targets_path: "data/clinical.csv"
  splits_path: "data/master_patient_splits.csv"
  weights_save: "data/best_wsi.pth"

processing:
  chunk_size: 20
  patch_size: 512
  resize_to: 224
  max_patches: 16
  white_thresh: 220
  white_tolerance: 0.5

training:
  # === MODEL SELECTION ===
  model_library: "transformers"  # "timm" or "transformers"
  model_name: "owkin/phikon-v2"  # Clean HF repo name (no "hf-hub:" prefix)

  # === PRETRAINING & NORMALIZATION ===
  pretrained: true
  normalize: true  # Set false if model expects raw [0,1] inputs
  norm_mean: [0.485, 0.456, 0.406]  # ImageNet defaults (override per model)
  norm_std: [0.229, 0.224, 0.225]

  # === TRAINING TOGGLES ===
  do_training: false
  freeze_backbone: true
  device: "auto"

  # === HYPERPARAMS ===
  epochs: 30
  batch_size: 16
  lr: 1.0e-4
  weight_decay: 1.0e-4
  dropout: 0.3
  huber_delta: 1.0
  seed: 42