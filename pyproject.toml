[project]
name = "ICMTC-AIC4-2026-Zerone"
version = "0.1.0"
description = "An Aerial Vision Challenge: Advancing real-time single-object tracking in dynamic drone-captured environments"
readme = "README.md"
requires-python = ">=3.13"
authors = [
    { name = "Team Zerone", email = "" }
]
keywords = ["single-object-tracking", "UAV", "aerial-vision", "real-time"]

# ── CORE RUNTIME DEPENDENCIES ──────────────────────────────────────────────────

dependencies = [
    # Vision & numerics
    "numpy>=1.26",
    "opencv-python-headless>=4.9",   # headless = no Qt/X11 (Docker-safe)
    "scipy>=1.13",                   # AUC integration, bbox utilities

    # Config-driven architecture
    "pyyaml>=6.0",
    "cookiecutter>=2.6",             # Bootstrap new member folders

    # Experiment tracking
    "wandb>=0.17",

    # Progress + logging
    "tqdm>=4.66",
    "rich>=13.7",                    # Pretty console tables for metric summaries

    # Data handling
    "pandas>=2.2",
    "polars>=0.20",

    # Needed
    "kaggle>=1.6",
    "ruff>=0.9.0",

]

# ── OPTIONAL DEPENDENCY GROUPS ─────────────────────────────────────────────────
[project.optional-dependencies]

# install via `uv pip install -e ".[dl]"`) when needed.
# Deep-learning stack — uncomment torch above if you pull this in
dl = [
    "torch>=2.3.0",
    "torchvision>=0.18.0",
    "timm>=1.0",                     # Backbone zoo (ViT, MobileNet, EfficientViT…)
    "einops>=0.8",                   # Expressive tensor ops for attention models
]

# FLOPs / latency profiling — requires the dl group to be installed first
profiling = [
    "thop>=0.1.1",                   # torch-op-counter
    "fvcore>=0.1.5",                 # Facebook's FLOP counter (more accurate for some archs)
]

# Developer tooling — one-time install, not needed on every machine
dev = [
    "pre-commit>=3.7",
    "ipykernel>=6.29",
    "jupyter>=1.0",
]


# ── ENTRY POINTS ───────────────────────────────────────────────────────────────
[project.scripts]
train-tracker = "src.train:main"
eval-tracker  = "src.inference:main"
submit        = "src.scripts.submit:main"

[project.urls]
Repository = "https://github.com/zerone-team/aic4-tracker"

# ── RUFF CONFIGURATION ─────────────────────────────────────────────────────────
[tool.ruff]
line-length    = 88
target-version = "py313"
exclude = [
    ".git",
    ".venv",
    "__pycache__",
    "data",
    # "members",    # uncomment to also ignore member notebooks
]

[tool.ruff.lint]
select = [
    "E",
    "W",
    "F",
    "I",
    "B",
    "C4",
    "UP",
    "SIM",
    "RUF",
    "N",
    "PTH",
    "TRY",
    "ERA",
]
ignore = [
    "E501",
    "TRY003",
    "ERA001",
    "N806",
    "N812",
]

[tool.ruff.lint.per-file-ignores]
"members/**"    = ["E402", "F401", "ERA001", "B018"]  # exploratory notebooks
"src/models/**" = ["N806"]                             # tensor dim names
"tests/**"      = ["S101"]                             # assert is fine in tests

[tool.ruff.lint.isort]
known-first-party         = ["src"]
force-sort-within-sections = true

[tool.ruff.format]
quote-style  = "double"
indent-style = "space"